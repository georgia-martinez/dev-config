# ~/.config/tmux/tmux.conf

# --- general ---
set -g mouse on                      # click/scroll/resize panes with the mouse
set -g focus-events on               # forward focus events so nvim auto-reloads
set -g base-index 1                  # windows start at 1
setw -g pane-base-index 1            # panes start at 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 10               # snappier <Esc> in nvim

# --- clipboard (macOS) ---
set -g set-clipboard on                      # allow tmux to set the system clipboard
# Drag-select with the mouse copies to the macOS clipboard on release.
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
# Keyboard copy in copy-mode (y or Enter) also goes to the macOS clipboard.
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# --- colors ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # truecolor

# --- vi-style pane navigation (prefix + h/j/k/l) ---
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- splits that inherit the current pane's directory ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# --- reload config ---
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"
