# Nested tmux config for the `dev` terminal pane.
#
# This turns the bottom-right terminal pane into a VS Code-style terminal with
# multiple switchable sessions: each "tab" is a tmux window, shown in a tab bar
# at the top of the pane. It runs on its own socket (-L devterm) and uses a
# different prefix than the outer session, so the two never fight.
#
#   Outer tmux (the dev layout) ........ prefix C-b
#   Inner tmux (this terminal pane) .... prefix C-a
#
# Tab controls (when focus is in the terminal pane):
#   C-a c        new terminal tab            C-a 1..9   jump to tab N
#   C-a n / p    next / previous tab         C-a ,      rename tab
#   C-a &        close tab                   click a tab in the bar to switch
#   Alt-t        new tab (no prefix)         Alt-h / Alt-l   prev / next tab
#   (Alt shortcuts need "Option as Meta" enabled in your terminal.)

# --- distinct prefix so it doesn't collide with the outer tmux (C-b) ---
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# --- general (mirrors the outer config so behavior feels consistent) ---
set -g mouse on
set -g base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 10
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# --- tab bar: window list across the top of the pane, like editor tabs ---
set -g status-position top
set -g status-justify left
set -g status-style "bg=#1e1e2e,fg=#7f849c"
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] term #[fg=#89b4fa,bg=#1e1e2e]"
set -g status-left-length 12
set -g status-right ""
set -g window-status-format "  #I #W  "
set -g window-status-current-format "#[fg=#1e1e2e,bg=#cba6f7,bold]  #I #W  #[default]"
set -g window-status-separator ""

# --- VS Code-ish no-prefix shortcuts (active only inside this pane) ---
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-w confirm-before -p "close this terminal tab? (y/n)" kill-window

# New tabs open in the same directory as the current one.
bind c new-window -c "#{pane_current_path}"
